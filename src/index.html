<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aether</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=3">
  <link rel="icon" href="assets/icons/logo.svg">
  <script src="https://w.soundcloud.com/player/api.js"></script>
</head>
<body>

<!-- ===== TITLE BAR (Electron) ===== -->
<div data-tauri-drag-region class="title-bar">
    <div class="title-bar-drag">
        <span class="title-bar-title">Aether</span>
    </div>
    <div class="title-bar-controls">
        <button class="title-btn" id="title-minimize" title="Свернуть">
            <svg width="12" height="12" viewBox="0 0 12 12"><line x1="2" y1="6" x2="10" y2="6" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
        <button class="title-btn" id="title-maximize" title="Развернуть">
            <svg width="12" height="12" viewBox="0 0 12 12"><rect x="2" y="2" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
        <button class="title-btn title-btn--close" id="title-close" title="Закрыть">
            <svg width="12" height="12" viewBox="0 0 12 12"><line x1="3" y1="3" x2="9" y2="9" stroke="currentColor" stroke-width="1.5"/><line x1="9" y1="3" x2="3" y2="9" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
    </div>
</div>

<div class="app">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar">
    <nav class="sidebar-nav">
      <div class="nav-item active" data-page="home" title="Главная">
        <span class="nav-icon-svg" id="nav-home-icon"></span>
      </div>
      <div class="nav-item" id="nav-player-btn" title="Плеер">
        <span class="nav-icon-svg" id="nav-player-icon"></span>
      </div>
      <div class="nav-item" data-page="search" title="Поиск">
        <span class="nav-icon-svg" id="nav-search-icon"></span>
      </div>
      <div class="nav-item" data-page="library" title="Библиотека">
        <span class="nav-icon-svg" id="nav-library-icon"></span>
      </div>
    </nav>

    <!--<nav class="sidebar-nav sidebar-nav--bottom">
      <div class="nav-item" id="nav-settings-btn" title="Настройки">
        <span class="nav-icon-svg" id="nav-settings-icon"></span>
      </div>
      <div class="nav-item" id="nav-account-btn" title="Аккаунт">
        <span class="nav-icon-svg" id="nav-account-icon"></span>
      </div>
    </nav> -->
  </aside>

  <div class="main-wrapper">

    <header class="header">
      <div class="search-wrapper">
        <span id="search-input-icon" class="search-icon-svg"></span>
        <input type="text" id="search-input" class="search-input" placeholder="Исполнители, треки, плейлисты, подкасты" autocomplete="off">
      </div>
    </header>

    <main class="main">
      <div class="content">

        <!-- ===== HOME PAGE ===== -->
        <div id="page-home" class="page active">
          <div class="home-body">
            <div class="my-wave-section">
              <div class="my-wave-header">
                <h3><span class="wave-dot"></span>Моя Волна</h3>
                <button class="wave-play-btn" id="wave-play-all"><span class="btn-icon" id="wave-play-icon"></span> Слушать</button>
              </div>
                  <div class="tracks-horizontal" id="my-wave-tracks"></div>
            </div>
            <div class="quick-cards">
              <div class="quick-card" id="quick-history">
                <div class="quick-card-icon history"></div>
                <div class="quick-card-text"><h4>История</h4><p id="history-count">0 треков</p></div>
              </div>
              <div class="quick-card" id="quick-fav">
                <div class="quick-card-icon fav"></div>
                <div class="quick-card-text"><h4>Избранное</h4><p id="fav-count">0 треков</p></div>
              </div>
            </div>
            <div class="section">
              <div class="section-header"><h3><span class="section-icon" id="popular-icon"></span> Популярное</h3></div>
              <div class="tracks-horizontal" id="popular-tracks"></div>             
            </div>
          </div>
        </div>

        <!-- ===== SEARCH PAGE ===== -->
        <div id="page-search" class="page">
          <div class="search-filters">
            <button class="filter-btn active" data-filter="tracks"><span class="filter-icon" id="filter-tracks-icon"></span> Треки</button>
            <button class="filter-btn" data-filter="playlists"><span class="filter-icon" id="filter-playlists-icon"></span> Плейлисты</button>
            <button class="filter-btn" data-filter="artists"><span class="filter-icon" id="filter-artists-icon"></span> Артисты</button>
          </div>
          <div id="search-results" class="track-list-container">
            <div class="not-found active">
              <div class="not-found-icon">
                <span class="cw-icon empty-svg-icon"></span>
              </div>
              <h3>Ничего не найдено</h3>
            </div>
          </div>
        </div>

        <!-- ===== LIBRARY PAGE ===== -->
        <div id="page-library" class="page">
          <div class="lib-top-widgets">
            <div class="lib-widget lib-widget--fav" id="lib-fav-widget">
              <div class="lib-widget-icon"></div>
              <h4>Избранное</h4>
              <p id="lib-fav-count">0 треков</p>
            </div>
          </div>
          <div class="library-layout">
            <div class="library-sidebar">
              <button class="lib-new-pl-btn" id="lib-new-pl-btn" title="Новый плейлист">
                <span class="lib-new-pl-icon"></span>
              </button>
              <button class="lib-history-btn" id="lib-history-btn" title="История">
                <span class="lib-history-icon"></span>
              </button>
              <div class="lib-playlists-column" id="lib-playlists-column"></div>
            </div>
            <div class="library-content" id="library-content">
              <div class="lib-empty-state" id="lib-empty-state">
                <div class="lib-empty-icon"></div>
                <h3>Выберите плейлист</h3>
                <p>Или создайте новый</p>
              </div>
              <div class="lib-playlist-view" id="lib-playlist-view" style="display:none;">
                <div class="lib-pl-header">
                  <div class="lib-pl-cover-wrap">
                    <img class="lib-pl-cover" id="lib-pl-cover" src="" alt="" style="display:none;">
                    <div class="lib-pl-cover-placeholder" id="lib-pl-cover-placeholder">
                      <span class="cw-icon"></span>
                    </div>
                    <span class="lib-pl-track-count" id="lib-pl-track-count">0 треков</span>
                  </div>
                  <div class="lib-pl-info">
                    <h2 class="lib-pl-name" id="lib-pl-name">Название</h2>
                    <p class="lib-pl-creator">Создано вами</p>
                  </div>
                  <div class="lib-pl-actions">
                    <button class="lib-pl-action-btn" id="lib-pl-play-all" title="Играть всё"></button>
                    <button class="lib-pl-action-btn" id="lib-pl-edit" title="Редактировать"></button>
                    <button class="lib-pl-action-btn" id="lib-pl-edit-cancel" title="Отмена" style="display:none;"></button>
                    <button class="lib-pl-action-btn" id="lib-pl-edit-confirm" title="Подтвердить" style="display:none;"></button>
                    <button class="lib-pl-action-btn" id="lib-pl-more" title="Ещё"></button>
                  </div>
                </div>
                <div class="lib-pl-tracks-scroll" id="lib-pl-tracks-scroll">
                  <div class="lib-pl-tracks" id="lib-pl-tracks"></div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- ===== PLAYLIST PAGE ===== -->
        <div id="page-playlist" class="page">
          <div class="page-header playlist-page-header">
            <button class="back-btn" data-back="library">← Назад</button>
            <div>
              <h2 id="pl-page-name">Плейлист</h2>
              <p id="pl-page-count">0 треков</p>
            </div>
            <div class="playlist-page-actions">
              <button class="btn-primary" id="pl-page-play-all"><span class="btn-icon" id="pl-play-icon"></span> Слушать всё</button>
              <button class="btn-cancel" id="pl-page-delete"><span class="btn-icon" id="pl-delete-icon"></span> Удалить</button>
            </div>
          </div>
          <div id="pl-page-tracks" class="track-list-container"></div>
        </div>

        <!-- ===== ARTIST PAGE ===== -->
        <div id="page-artist" class="page">
          <div class="artist-page-header">
            <button class="back-btn" data-back="search">← Назад</button>
            <img id="artist-avatar" class="artist-page-avatar" src="" alt="">
            <div class="artist-page-info">
              <h2 id="artist-name">Артист</h2>
              <p id="artist-meta"></p>
              <div class="artist-page-btns" id="artist-page-btns" style="display:none; gap:8px; margin-top:8px;">
                <button class="artist-play-all-btn" id="artist-play-all-btn" title="Играть всё">
                  <span class="cw-icon"></span> Играть всё
                </button>
                <button class="artist-save-btn" id="artist-save-btn" title="Сохранить в библиотеку">
                  <span class="cw-icon"></span>
                </button>
              </div>
            </div>
          </div>
          <div id="artist-tracks" class="track-list-container"></div>
        </div>

                <!-- ===== PLAYER PAGE ===== -->
        <div id="page-player" class="page">
          <div class="player-page-inner">
<div class="player-page-left">
    <div class="player-page-top">
        <div class="player-page-cover-wrap">
            <img id="page-cover" src="" alt="" style="display:none;">
            <span class="full-cover-placeholder" id="page-cover-placeholder"></span>
        </div>
        <div class="player-page-track-info">
            <h1 id="page-title">Выберите трек</h1>
            <p id="page-artist-text">Исполнитель</p>
            <div class="player-page-actions-row">
                <button id="page-fav-btn" class="full-fav-btn" title="В избранное"></button>
                <button id="page-add-pl-btn" class="full-add-pl-btn" title="Добавить в плейлист"></button>
            </div>
        </div>
    </div>
    <div class="player-page-controls-section">
        <div class="player-page-progress-wrap">
            <span id="page-cur-time" class="time-label">0:00</span>
            <div id="page-progress-track" class="full-progress-track">
                <div id="page-progress-fill"></div>
            </div>
            <span id="page-dur-time" class="time-label right">0:00</span>
        </div>
        <div class="player-page-controls">
            <button id="page-shuffle-btn" class="full-ctrl-btn" title="Перемешать"></button>
            <button id="page-prev-btn" class="full-ctrl-btn"></button>
            <button id="page-play-btn" class="full-play-btn">▶</button>
            <button id="page-next-btn" class="full-ctrl-btn"></button>
            <button id="page-repeat-btn" class="full-ctrl-btn" title="Повтор"></button>
        </div>
        <div class="player-page-volume-row">
            <span id="page-vol-low" class="full-vol-icon"></span>
            <div class="full-volume-slider-track" id="page-volume-slider-track">
                <div class="full-volume-slider-fill" id="page-volume-slider-fill"></div>
                <div class="full-volume-slider-thumb" id="page-volume-slider-thumb"></div>
            </div>
            <span id="page-vol-high" class="full-vol-icon"></span>
        </div>
    </div>
</div>
<div class="player-page-queue">
    <h3 id="page-queue-label">Очередь</h3>
    <div id="page-queue-list" class="queue-list"></div>
</div>
          </div>
        </div>


      </div>
    </main>

    <!-- ===== MINI PLAYER BAR ===== -->
<footer id="player-bar" class="player-bar">
  <div class="player-content">
    <div class="now-playing" id="now-playing-area">
      <div class="player-cover-wrap" style="position:relative;">
        <img id="player-cover" src="" alt="" style="display:none;">
        <span class="player-cover-placeholder" id="player-cover-placeholder"></span>
      </div>
      <div class="now-playing-info">
        <div id="player-title">Выберите трек</div>
        <div id="player-artist"></div>
      </div>
      <button id="mini-fav-btn" class="now-playing-fav" title="В избранное"></button>
    </div>
    <div class="player-controls">
      <div class="controls-row">
        <button id="shuffle-btn" class="ctrl-btn" title="Перемешать"></button>
        <button id="mini-prev-btn" class="ctrl-btn"></button>
        <button id="mini-play-btn" class="ctrl-btn-main">▶</button>
        <button id="mini-next-btn" class="ctrl-btn"></button>
        <button id="repeat-btn" class="ctrl-btn" title="Повтор"></button>
      </div>
      <div class="progress-row">
        <span id="cur-time" class="time-label">0:00</span>
        <div id="progress-track" class="progress-track"><div id="progress-fill"></div></div>
        <span id="dur-time" class="time-label right">0:00</span>
      </div>
    </div>
    <div class="player-extra">
      <div class="add-pl-wrap" id="add-pl-wrap">
        <button id="mini-add-pl-btn" class="extra-btn" title="Добавить в плейлист"></button>
      </div>
      <div class="volume-wrap" id="volume-wrap">
        <button id="vol-icon-btn" class="vol-icon-btn" title="Громкость"></button>
        <div class="volume-slider-wrap" id="volume-slider-wrap">
          <div class="volume-slider-track" id="volume-slider-track">
            <div class="volume-slider-fill" id="volume-slider-fill"></div>
            <div class="volume-slider-thumb" id="volume-slider-thumb"></div>
          </div>
        </div>
      </div>
      <button id="expand-btn" class="extra-btn" title="Открыть плеер"></button>
    </div>
  </div>
  </footer>


  </div>
</div>



<!-- ===== MODALS ===== -->
<div id="modal-overlay" class="modal-overlay">
  <div class="modal-create-pl">
    <input id="modal-pl-input" class="modal-pl-input" type="text" placeholder="Название плейлиста..." maxlength="60" autocomplete="off">
    <button id="modal-create-btn" class="modal-pl-check" disabled>
      <span class="cw-icon">✓</span>
    </button>
  </div>
</div>

<div id="toast" class="toast"></div>

<iframe id="sc-widget" src="" width="0" height="0" frameborder="no" allow="autoplay" style="display:none;position:absolute;"></iframe>

<div class="add-pl-dropdown" id="add-pl-dropdown" style="display:none;">
  <div class="add-pl-list" id="add-pl-list"></div>
</div>

<script src="js/storage.js"></script>
<script src="js/core.js"></script>
<script src="js/api.js"></script>      
<script src="js/icons.js"></script>
<script src="js/cache.js"></script>
<script src="js/player.js"></script>
<script src="js/ui.js"></script>       
<script src="js/main.js"></script>     
<script>
const origCreate = window.StorageAPI?.createPlaylist;
if (origCreate) {
  window.StorageAPI.createPlaylist = function(name) {
    const pl = origCreate.call(window.StorageAPI, name);
    return pl;
  };
}

const origDelete = window.StorageAPI?.deletePlaylist;
if (origDelete) {
  window.StorageAPI.deletePlaylist = function(id) {
    origDelete.call(window.StorageAPI, id);
    return pl;
  };
}

document.addEventListener('DOMContentLoaded', () => {
  window.renderFavorites?.();
});
</script>
<script>
document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    return false;
});
</script>
<script>
if (typeof window.__TAURI__ !== 'undefined') {
    var getCurrentWindow = window.__TAURI__.window.getCurrentWindow;
    var win = getCurrentWindow();
    
    document.getElementById('title-minimize')?.addEventListener('click', function() {
        win.minimize();
    });
    document.getElementById('title-maximize')?.addEventListener('click', function() {
        win.toggleMaximize();
    });
    document.getElementById('title-close')?.addEventListener('click', function() {
        win.close();
    });
}
</script>
</body>
</html>
